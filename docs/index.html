<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TIM — Motor de Física</title>
  <meta name="description" content="TIM: The Incredible Machine Remastered — simulador de física 2D interactivo." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #16162a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #c8c8dc;
      overflow: hidden;
      touch-action: none;
    }
    #canvas-wrapper {
      display: none;
      position: relative;
      /* transform-origin top-left so scaling math is simple */
      transform-origin: top left;
    }
    #canvas {
      display: block;
      border: 2px solid #2e2e50;
      box-shadow: 0 0 60px rgba(100, 80, 255, 0.25);
      image-rendering: pixelated;
    }
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 1rem;
      color: #8282a0;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .spinner-ring {
      width: 56px;
      height: 56px;
      border: 4px solid #2e2e50;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-wrap {
      width: 280px;
      background: #1e1e3a;
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      border-radius: 99px;
      transition: width 0.3s ease;
    }
    #status-text {
      font-size: 0.78rem;
      color: #6060a0;
      letter-spacing: 0.06em;
      min-height: 1.2em;
    }
    #error-box {
      display: none;
      background: #2a1020;
      border: 1px solid #8b3a52;
      border-radius: 10px;
      padding: 18px 24px;
      max-width: 400px;
      text-align: center;
      font-size: 0.88rem;
      color: #f08080;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="logo">TIM</div>
    <div class="subtitle">Motor de Física · Prototipo Web</div>
    <div class="spinner-ring"></div>
    <div class="progress-wrap"><div id="progress-bar"></div></div>
    <div id="status-text">Cargando assets…</div>
    <div id="error-box"></div>
  </div>

  <div id="canvas-wrapper">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  </div>

  <script>
    var Module = {
      canvas: (function() {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener('webglcontextlost', function(e) {
          alert('WebGL context lost. Recarga la página.');
          e.preventDefault();
        }, false);
        return canvas;
      })(),

      onRuntimeInitialized: function() {
        document.getElementById('loading-screen').style.display = 'none';
        var wrapper = document.getElementById('canvas-wrapper');
        wrapper.style.display = 'block';
        scaleCanvas();
      },

      setStatus: function(text) {
        var statusEl = document.getElementById('status-text');
        var barEl    = document.getElementById('progress-bar');
        if (!text) {
          statusEl.textContent = 'Iniciando motor…';
          barEl.style.width = '100%';
          return;
        }
        var match = text.match(/(\d+)\/(\d+)/);
        if (match) {
          var pct = (parseInt(match[1]) / parseInt(match[2]) * 100).toFixed(0);
          barEl.style.width = pct + '%';
          statusEl.textContent = 'Descargando assets… ' + pct + '%';
        } else {
          statusEl.textContent = text;
        }
      },
      print:    function(text) { console.log(text); },
      printErr: function(text) {
        console.error(text);
        if (text.indexOf('EXCEPTION') !== -1 || text.indexOf('Aborted') !== -1) {
          var e = document.getElementById('error-box');
          e.style.display = 'block';
          e.textContent = 'Error al iniciar el juego: ' + text;
        }
      },
      doNotCaptureKeyboard: false,
    };

    function scaleCanvas() {
      var canvas  = document.getElementById('canvas');
      var wrapper = document.getElementById('canvas-wrapper');
      if (!canvas.width || !canvas.height) return;

      var availW = window.innerWidth;
      var availH = window.innerHeight;
      var scale  = Math.min(availW / canvas.width, availH / canvas.height);

      wrapper.style.width  = canvas.width  + 'px';
      wrapper.style.height = canvas.height + 'px';
      wrapper.style.transform = 'scale(' + scale + ')';

      /* centre the scaled wrapper */
      var offsetX = (availW - canvas.width  * scale) / 2;
      var offsetY = (availH - canvas.height * scale) / 2;
      wrapper.style.position = 'fixed';
      wrapper.style.left = offsetX + 'px';
      wrapper.style.top  = offsetY + 'px';
    }

    window.addEventListener('resize', scaleCanvas);
    window.addEventListener('orientationchange', function() {
      setTimeout(scaleCanvas, 200); /* small delay for orientation to settle */
    });
  </script>
  <script async src="index.js"></script>
</body>
</html>
